agent:
  type: "codex"
  cooldown_seconds: 15
  max_work_items_per_session: 1

workflow:
  instructions: |
    Follow strict TDD.
    Start with a failing test at a confirmed public seam and make the smallest implementation that passes.
    Keep runtime changes behind typed contracts.
    Reject silent drift between validation, release, and policy expectations.

execution:
  max_post_agent_retries: 0
  max_retry_output_chars: 1200

tracker:
  type: "file"
  status_file: "sprint-status.yaml"

circuit_breaker:
  max_failures: 2
  cooldown_minutes: 5

research:
  enabled: false
  strategy: "always"
  tools: []

plugins:
  - id: official.codex
    activation: enabled
  - id: official.tdd-strict
    activation: enabled
